<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup - PhishGuard AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff7e5f, #feb47b);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
}

/* Glass Card */
.card {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    padding: 30px;
    width: 350px;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Inputs */
input {
    background: rgba(255,255,255,0.2) !important;
    border: none !important;
    color: white !important;
}

input::placeholder {
    color: #ddd !important;
}

/* Button */
.btn-custom {
    background: white;
    color: #333;
    font-weight: 600;
}
.btn-custom:hover {
    background: #f1f1f1;
}
</style>
</head>

<body>

<div class="card text-center">

    <h3 class="mb-3">📝 Create Account</h3>

    {% if error %}
        <div class="alert alert-danger p-2">{{ error }}</div>
    {% endif %}

    {% if success %}
        <div class="alert alert-success p-2">{{ success }}</div>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
        <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

        <button class="btn btn-custom w-100">Signup</button>
    </form>

    <p class="mt-3">
        Already have an account?
        <a href="/user-login" class="text-dark">Login</a>
    </p>

</div>

</body>
</html>
