<!DOCTYPE html>
<html>
<head>
    <title>Phishing Email Detector</title>
</head>
<body>
    <h2>Phishing Email Detector</h2>
    <form method="POST">
        <textarea name="email" rows="6" cols="50" placeholder="Paste email here..."></textarea><br><br>
        <button type="submit">Check Email</button>
    </form>

    {% if prediction %}
        <h3>{{ prediction }}</h3>
    {% endif %}
</body>
</html>
